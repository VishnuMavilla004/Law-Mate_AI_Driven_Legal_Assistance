<svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" viewBox="0 0 140 140" role="img" aria-label="LawMate variant logo">
  <defs>
    <linearGradient id="nv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07223A" />
      <stop offset="100%" stop-color="#0B3B61" />
    </linearGradient>
    <linearGradient id="gd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D2A84B" />
      <stop offset="100%" stop-color="#B8862D" />
    </linearGradient>
  </defs>

  <!-- circular badge -->
  <circle cx="70" cy="70" r="66" fill="url(#nv)" />

  <!-- subtle ring -->
  <circle cx="70" cy="70" r="58" fill="none" stroke="#0B3B61" stroke-opacity="0.12" stroke-width="4" />

  <!-- abstract scale icon (gold) -->
  <g transform="translate(70,62)">
    <rect x="-2" y="-22" width="4" height="28" fill="url(#gd)" rx="1" />
    <rect x="-28" y="-22" width="56" height="6" fill="url(#gd)" rx="3" />
    <path d="M-20 -8c-5 0-9 3-9 5 0 2 4 5 9 5s9-3 9-5c0-2-4-5-9-5z" fill="#F6E7C4" stroke="#C49A3A" stroke-width="1" />
    <path d="M20 -8c-5 0-9 3-9 5 0 2 4 5 9 5s9-3 9-5c0-2-4-5-9-5z" fill="#F6E7C4" stroke="#C49A3A" stroke-width="1" />
  </g>

  <!-- monogram LM below the scales for identification (small) -->
  <text x="70" y="110" font-family="Inter, Poppins, sans-serif" font-weight="700" font-size="18" text-anchor="middle" fill="#F6E7C4">LM</text>
</svg>